version: '3.8'

services:
  app:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=3000
      - DB_PATH=/app/data/tasks.db
      - MODEL=${MODEL:-claude-sonnet-4-6}
    volumes:
      - task_data:/app/data
    restart: unless-stopped

volumes:
  task_data:
